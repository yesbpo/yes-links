name: yes-links-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          npm ci

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Core coverage gate (core >= 90)
        run: |
          pytest \
            --cov=src/services \
            --cov=src/repositories \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Integration tests
        run: pytest tests/integration -q

      - name: API coverage gate (api >= 80)
        run: |
          pytest \
            --cov=src/api \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: UI tests
        run: npx playwright test

      - name: OpenAPI contract validation
        run: |
          python - <<'PY'
          import yaml
          with open('docs/openapi.yaml', 'r', encoding='utf-8') as f:
              spec = yaml.safe_load(f)
          assert 'paths' in spec, 'openapi.yaml must define paths'
          for p in ['/links', '/{short_code}', '/links/{id}', '/links/{id}/stats']:
              assert p in spec['paths'], f'Missing required path: {p}'
          print('OpenAPI contract validation passed.')
          PY

  docker-build:
    runs-on: ubuntu-latest
    needs: quality-gates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t yes-links:ci .
